<!DOCTYPE html>
<html>

<head>
  <style>
    #toolbar {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: white;
      padding: 8px 12px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      font-family: sans-serif;
    }
  </style>
  <link rel="stylesheet" href="/src/style.css">
</head>

<body style="margin:0; overflow:hidden">

  <div id="toolbar">

    <button id="addWordBtn">
      +
    </button>

    <input type="color" id="colorPicker" value="#000000" />
  </div>

  <div id="nodeActions">

    <button id="editNodeBtn">
      Edit
    </button>

    <button id="deleteNodeBtn">
      Delete
    </button>

  </div>

  <div id="wordModal" class="hidden">

    <div class="modal-content">

      <button id="closeModalBtn" class="close-btn">
        ×
      </button>

      <h3>Word</h3>

      <input id="wordInput" placeholder="Word" />

      <input id="tagInput" placeholder="Tag" />

      <button id="saveWordBtn">
        Save
      </button>

    </div>

  </div>

  <div id="todoPanel">

    <button id="todoToggle">
      ▼ TODO
    </button>

    <div id="todoBody">

      <div id="todoList">
      </div>

      <div id="todoInputRow">

        <input id="todoInput" placeholder="Add task..." />

        <button id="todoAddBtn">
          +
        </button>

      </div>

    </div>

  </div>

  <canvas id="canvas"></canvas>

  <script type="module" src="/src/main.js"></script>

</body>

</html>
